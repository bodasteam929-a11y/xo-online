<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XO Online | boda Edition 🎮</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="lobby" class="container">
        <h1>XO أونلاين 🎮</h1>
        <input type="text" id="playerName" placeholder="ادخل اسمك يا بطل">
        <button onclick="createRoom()">إنشاء غرفة (Create Room)</button>
        <div style="margin: 15px 0; color: #64748b;">أو</div>
        <input type="text" id="roomCodeInput" placeholder="ادخل كود الغرفة">
        <button onclick="joinRoom()">دخول الكود (Enter Code)</button>
    </div>

    <div id="waitingRoom" class="container" style="display:none;">
        <h2>غرفة الانتظار ⏳</h2>
        <div class="players-info">
            <div id="p1-slot" class="player-slot">اللاعب 1: --</div>
            <div class="vs">VS</div>
            <div id="p2-slot" class="player-slot">اللاعب 2: --</div>
        </div>
        <p>كود الغرفة: <b id="displayRoomCode" style="color: #38bdf8; font-size: 1.5rem;">----</b></p>
        <button id="startBtn" style="display:none; background: #4ecca3;" onclick="startGame()">ابدأ الجيم (Start)</button>
    </div>

    <div id="gameZone" class="container" style="display:none;">
        <h3 id="turnStatus">دوارك الآن!</h3>
        <div class="xo-grid">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
    </div>

    <div id="resultModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2 id="winnerMessage">🎉 الفائز</h2>
            <div id="adminControls" style="display:none;">
                <button onclick="requestRestart()" style="background: #4ecca3;">إعادة اللعب 🔄</button>
                <button onclick="goToLobby()" style="background: #e94560;">الخروج للرئيسية 🏠</button>
            </div>
            <p id="waitMessage" style="display:none; color: #94a3b8;">في انتظار قرار صاحب الغرفة...</p>
        </div>
    </div>

    <div id="rematchModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h2>🔄 طلب تحدي جديد!</h2>
            <p>الخصم يريد إعادة اللعب، هل توافق؟</p>
            <button onclick="acceptRematch()" style="background: #4ecca3;">موافق، هيا بنا!</button>
            <button onclick="goToLobby()" style="background: #e94560;">لا، الخروج</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
